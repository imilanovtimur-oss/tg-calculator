<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cartoon Tetris</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            background: var(--panel-bg);
            padding: 5px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        canvas {
            border: 4px solid #30475e;
            border-radius: 15px;
            background: #16213e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-height: 60vh;
        }

        /* Кнопки управления для мобилок */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .btn {
            background: var(--panel-bg);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.3);
        }

        .btn-rotate { grid-column: 2; background: rgba(255, 165, 0, 0.4); }
        .btn-down { grid-column: 2; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>
    <canvas id="tetris"></canvas>
</div>

<div class="controls">
    <div class="btn" onclick="move(-1)">◀</div>
    <div class="btn btn-rotate" onclick="rotate()">↻</div>
    <div class="btn" onclick="move(1)">▶</div>
    <div></div>
    <div class="btn btn-down" onclick="drop()">▼</div>
    <div></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');

    // Настройка размеров под экран
    const ROWS = 20;
    const COLS = 10;
    const BLOCK_SIZE = Math.min(window.innerWidth * 0.08, window.innerHeight * 0.03);
    canvas.width = COLS * BLOCK_SIZE;
    canvas.height = ROWS * BLOCK_SIZE;
    context.scale(1, 1);

    // Цвета для мультяшных блоков
    const COLORS = [
        null,
        '#FF006E', // T
        '#FB5607', // O
        '#FFBE0B', // L
        '#8AC926', // J
        '#3A86FF', // I
        '#FF006E', // S
        '#8338EC'  // Z
    ];

    function createPiece(type) {
        if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
        if (type === 'O') return [[2, 2], [2, 2]];
        if (type === 'L') return [[0, 0, 3], [3, 3, 3], [0, 0, 0]];
        if (type === 'J') return [[4, 0, 0], [4, 4, 4], [0, 0, 0]];
        if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
    }

    // Рисование блока в "мультяшном" стиле
    function drawBlock(x, y, colorIndex) {
        const xPos = x * BLOCK_SIZE;
        const yPos = y * BLOCK_SIZE;
        const radius = 6;

        context.fillStyle = COLORS[colorIndex];
        // Скругленный прямоугольник
        context.beginPath();
        context.roundRect(xPos + 1, yPos + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2, radius);
        context.fill();

        // Блик для объема
        context.fillStyle = 'rgba(255,255,255,0.3)';
        context.beginPath();
        context.roundRect(xPos + 4, yPos + 4, BLOCK_SIZE / 2, 4, 2);
        context.fill();
    }

    function draw() {
        context.fillStyle = '#16213e';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    drawBlock(x + offset.x, y + offset.y, value);
                }
            });
        });
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 10;
            rowCount *= 2;
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        scoreElement.innerText = player.score;
        levelElement.innerText = Math.floor(player.score / 100) + 1;
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function createArena(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        } else if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotateMatrix(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotateMatrix(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function rotateMatrix(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            scoreElement.innerText = 0;
        }
    }

    const arena = createArena(10, 20);
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
    };

    // Управление для внешних функций
    window.move = (dir) => playerMove(dir);
    window.rotate = () => playerRotate(1);
    window.drop = () => playerDrop();

    // Клавиатура для ПК
    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 38) playerRotate(1);
    });

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    playerReset();
    update();
</script>
</body>
</html>
