<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glass Calc Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Базовые настройки тем */
        :root {
            --bg-gradient: linear-gradient(45deg, #1e3a8a, #3b82f6);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #ffffff;
        }

        .theme-blue { --bg-gradient: linear-gradient(135deg, #0f172a, #1e40af); }
        .theme-purple { --bg-gradient: linear-gradient(135deg, #2e1065, #7c3aed); }
        .theme-green { --bg-gradient: linear-gradient(135deg, #064e3b, #10b981); }
        .theme-dark { --bg-gradient: linear-gradient(135deg, #000000, #4b5563); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-gradient);
            transition: background 0.5s ease;
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
        }

        /* Выбор темы */
        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 0 10px;
        }

        .theme-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .calc-wrapper {
            width: 100%;
            max-width: 400px;
            margin: auto auto 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        #display-container {
            text-align: right;
            padding: 20px;
            margin-bottom: 10px;
        }

        #display {
            font-size: 4.5rem;
            font-weight: 200;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            aspect-ratio: 1/1;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        button.operator {
            background: rgba(255, 255, 255, 0.25);
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        button.double {
            grid-column: span 2;
            aspect-ratio: auto;
        }

        #history {
            height: 20px;
            font-size: 1.1rem;
            opacity: 0.6;
            margin-bottom: 5px;
        }
    </style>
</head>
<body class="theme-blue">

<div class="theme-selector">
    <div class="theme-dot" style="background: #1e40af;" onclick="setTheme('theme-blue')"></div>
    <div class="theme-dot" style="background: #7c3aed;" onclick="setTheme('theme-purple')"></div>
    <div class="theme-dot" style="background: #10b981;" onclick="setTheme('theme-green')"></div>
    <div class="theme-dot" style="background: #333333;" onclick="setTheme('theme-dark')"></div>
</div>

<div class="calc-wrapper">
    <div id="display-container">
        <div id="history"></div>
        <div id="display">0</div>
    </div>
    
    <div class="grid">
        <button class="operator" onclick="clearAll()">AC</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')" class="double">0</button>
        <button onclick="append('.')">.</button>
        <button class="operator" style="background: white; color: black;" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const display = document.getElementById('display');
    const historyDiv = document.getElementById('history');

    tg.ready();
    tg.expand();
    tg.setHeaderColor('#000000'); // Пытаемся сделать шапку темной

    let currentInput = '';

    function setTheme(themeName) {
        document.body.className = themeName;
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function updateDisplay() {
        display.innerText = currentInput || '0';
        if (currentInput.length > 8) {
            display.style.fontSize = '2.5rem';
        } else {
            display.style.fontSize = '4.5rem';
        }
    }

    function append(char) {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        if (currentInput === '0' && char !== '.') currentInput = '';
        currentInput += char;
        updateDisplay();
    }

    function clearAll() {
        currentInput = '';
        historyDiv.innerText = '';
        updateDisplay();
    }

    function deleteLast() {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }

    function calculate() {
        try {
            if (!currentInput) return;
            const res = eval(currentInput.replace('×', '*').replace('÷', '/'));
            historyDiv.innerText = currentInput + ' =';
            currentInput = Number(res.toFixed(8)).toString();
            updateDisplay();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } catch (e) {
            display.innerText = 'Error';
            setTimeout(clearAll, 1000);
        }
    }
</script>

</body>
</html>
