<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Calc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f5f5f7);
            --text-color: var(--tg-theme-text-color, #000000);
            --accent-color: #007aff; /* Синий как в iOS */
            --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --button-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Калькулятор будет внизу, как на iPhone */
            height: 100vh;
            overflow: hidden;
            user-select: none; /* Запрещаем выделение текста (убирает синие рамки) */
            -webkit-tap-highlight-color: transparent; /* Убирает блик при нажатии */
        }

        .calc-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            background: var(--bg-color);
        }

        #display-container {
            padding: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 120px;
        }

        #history {
            font-size: 1.2rem;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 8px;
            height: 1.4rem;
        }

        #display {
            font-size: 4rem;
            font-weight: 200;
            margin: 0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-bottom: 30px;
        }

        button {
            aspect-ratio: 1 / 1; /* Делает кнопки идеально квадратными */
            border: none;
            border-radius: 50%; /* Круглые кнопки как в iOS */
            font-size: 1.6rem;
            font-weight: 400;
            cursor: pointer;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, brightness 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.9);
            filter: brightness(0.8);
        }

        button.operator {
            background-color: var(--accent-color);
            color: white;
            font-size: 1.8rem;
        }

        button.special {
            background-color: #d1d1d6;
            color: black;
        }

        /* Темная тема для спец-кнопок */
        @media (prefers-color-scheme: dark) {
            button.special { background-color: #3a3a3c; color: white; }
        }

        .double {
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 40px;
            padding-left: 25px;
            justify-content: flex-start;
        }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <div id="display-container">
        <div id="history"></div>
        <div id="display">0</div>
    </div>
    
    <div class="grid">
        <button class="special" onclick="clearAll()">AC</button>
        <button class="special" onclick="deleteLast()">⌫</button>
        <button class="special" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')" class="double">0</button>
        <button onclick="append('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const display = document.getElementById('display');
    const historyDiv = document.getElementById('history');

    tg.ready();
    tg.expand();

    let currentInput = '';

    function updateDisplay() {
        display.innerText = currentInput || '0';
        // Авто-уменьшение шрифта если число длинное
        if (currentInput.length > 7) {
            display.style.fontSize = '2.5rem';
        } else {
            display.style.fontSize = '4rem';
        }
    }

    function append(char) {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        if (currentInput === '0' && char !== '.') currentInput = '';
        currentInput += char;
        updateDisplay();
    }

    function clearAll() {
        currentInput = '';
        historyDiv.innerText = '';
        updateDisplay();
    }

    function deleteLast() {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }

    function calculate() {
        try {
            if (!currentInput) return;
            const expression = currentInput.replace('×', '*').replace('÷', '/');
            const result = Number(eval(expression).toFixed(8)); // Округляем до 8 знаков
            
            historyDiv.innerText = currentInput + ' =';
            currentInput = result.toString();
            updateDisplay();

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } catch (e) {
            display.innerText = 'Ошибка';
            setTimeout(clearAll, 1000);
        }
    }
</script>

</body>
</html>
